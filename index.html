<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TikTok Downloader</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:500px;
  background:#111827;
  border-radius:20px;
  padding:25px;
  box-shadow:0 0 25px rgba(0,0,0,.4);
}

h1{
  text-align:center;
  margin-bottom:10px;
  color:#8b5cf6;
}

.desc{
  text-align:center;
  color:#cbd5e1;
  margin-bottom:20px;
}

.input-box{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
  outline:none;
}

button{
  padding:15px 20px;
  border:none;
  border-radius:12px;
  background:#7c3aed;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.loading{
  margin-top:20px;
  text-align:center;
  display:none;
}

.result{
  margin-top:20px;
  display:none;
}

.card{
  background:#1e293b;
  border-radius:15px;
  overflow:hidden;
}

.thumb{
  width:100%;
  max-height:400px;
  object-fit:cover;
}

.content{
  padding:15px;
}

.title{
  font-size:17px;
  margin-bottom:10px;
}

.author{
  color:#94a3b8;
  margin-bottom:15px;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  font-size:14px;
}

.downloads{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.downloads a{
  text-decoration:none;
  padding:14px;
  border-radius:12px;
  text-align:center;
  color:white;
  font-weight:bold;
}

.video{
  background:#22c55e;
}

.mp3{
  background:#f59e0b;
}

.error{
  margin-top:15px;
  background:#dc2626;
  padding:12px;
  border-radius:12px;
  display:none;
  text-align:center;
}
</style>
</head>
<body>

<div class="container">

  <h1>🎵 TikTok Downloader</h1>
  <div class="desc">
    Download Video TikTok No Watermark & MP3
  </div>

  <div class="input-box">
    <input type="text" id="url" placeholder="Tempel link TikTok...">
    <button onclick="downloadTT()">Download</button>
  </div>

  <div class="loading" id="loading">
    Sedang mengambil video...
  </div>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="card">

      <img id="thumb" class="thumb">

      <div class="content">

        <div class="title" id="title"></div>

        <div class="author" id="author"></div>

        <div class="stats">
          <span id="likes"></span>
          <span id="comments"></span>
          <span id="shares"></span>
        </div>

        <div class="downloads">
          <a id="videoBtn" class="video" download>
            📥 Download Video
          </a>

          <a id="mp3Btn" class="mp3" download>
            🎧 Download MP3
          </a>
        </div>

      </div>
    </div>
  </div>

</div>

<script>
async function downloadTT(){

  const url = document.getElementById("url").value.trim();

  const loading = document.getElementById("loading");
  const result = document.getElementById("result");
  const error = document.getElementById("error");

  result.style.display = "none";
  error.style.display = "none";

  if(!url){
    error.innerText = "Masukkan link TikTok!";
    error.style.display = "block";
    return;
  }

  loading.style.display = "block";

  try{

    const api = `https://api.nexray.eu.cc/downloader/tiktok?url=${encodeURIComponent(url)}`;

    const response = await fetch(api);
    const json = await response.json();

    loading.style.display = "none";

    if(!json.status){
      error.innerText = "Video gagal ditemukan!";
      error.style.display = "block";
      return;
    }

    const data = json.result;

    document.getElementById("thumb").src =
      data.author.avatar || data.cover;

    document.getElementById("title").innerText =
      data.title || "Tanpa Judul";

    document.getElementById("author").innerText =
      "@" + data.author.nickname;

    document.getElementById("likes").innerText =
      "❤️ " + data.stats.likes;

    document.getElementById("comments").innerText =
      "💬 " + data.stats.comment;

    document.getElementById("shares").innerText =
      "🔁 " + data.stats.share;

    // VIDEO DOWNLOAD
    document.getElementById("videoBtn").href =
      data.url || data.video;

    // MP3 DOWNLOAD
    document.getElementById("mp3Btn").href =
      data.music.url;

    result.style.display = "block";

  }catch(err){

    loading.style.display = "none";

    error.innerText = "Terjadi error!";
    error.style.display = "block";

    console.log(err);
  }
}
</script>

</body>
</html>
