<!DOCTYPE html>
<html>
<head>
<title>TikTok Downloader</title>

<style>
body{
font-family:Arial;
background:#111827;
color:white;
padding:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:10px;
}

button{
padding:15px;
border:none;
border-radius:10px;
background:#7c3aed;
color:white;
width:100%;
margin-top:10px;
}

img{
width:100%;
margin-top:20px;
border-radius:10px;
}

#result{
display:none;
}
</style>

</head>
<body>

<h2>TikTok Downloader</h2>

<input
type="text"
id="url"
placeholder="Link TikTok"
>

<button onclick="searchTT()">
Cari
</button>

<div id="result">

<img id="thumb">

<h3 id="title"></h3>

<button onclick="downloadVideo()">
Download Video
</button>

<button onclick="downloadMp3()">
Download MP3
</button>

</div>

<script>

let video = "";
let mp3 = "";

async function searchTT(){

const url =
document.getElementById("url").value;

const res =
await fetch(
`/api/tiktok?url=${encodeURIComponent(url)}`
);

const json =
await res.json();

console.log(json);

video =
json.download.nowm;

mp3 =
json.download.mp3;

document.getElementById("thumb").src =
json.cover;

document.getElementById("title").innerText =
json.title;

document.getElementById("result").style.display =
"block";

}

function downloadVideo(){

const a =
document.createElement("a");

a.href = video;

a.download = "tiktok.mp4";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

}

function downloadMp3(){

const a =
document.createElement("a");

a.href = mp3;

a.download = "tiktok.mp3";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

}

</script>

</body>
</html>
