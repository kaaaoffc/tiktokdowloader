<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TikTok Downloader</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:500px;
  background:#111827;
  border-radius:20px;
  padding:25px;
  box-shadow:0 0 25px rgba(0,0,0,.5);
}

h1{
  text-align:center;
  margin-bottom:10px;
  color:#8b5cf6;
}

.desc{
  text-align:center;
  color:#94a3b8;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
  outline:none;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#7c3aed;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  opacity:.9;
}

.loading{
  display:none;
  text-align:center;
  margin-top:15px;
  color:#cbd5e1;
}

.error{
  display:none;
  margin-top:15px;
  background:#dc2626;
  padding:12px;
  border-radius:12px;
  text-align:center;
}

.result{
  display:none;
  margin-top:20px;
}

.card{
  background:#1e293b;
  border-radius:15px;
  overflow:hidden;
}

.thumb{
  width:100%;
}

.content{
  padding:15px;
}

.title{
  font-size:17px;
  margin-bottom:10px;
}

.author{
  color:#94a3b8;
  margin-bottom:15px;
}

.buttons{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.btn{
  display:block;
  text-decoration:none;
  text-align:center;
  padding:14px;
  border-radius:12px;
  color:white;
  font-weight:bold;
}

.video{
  background:#22c55e;
}

.mp3{
  background:#f59e0b;
}

</style>
</head>
<body>

<div class="container">

<h1>🎵 TikTok Downloader</h1>

<div class="desc">
Download Video TikTok No Watermark & MP3
</div>

<input
type="text"
id="url"
placeholder="Tempel link TikTok..."
>

<button onclick="downloadTT()">
🚀 Download
</button>

<div class="loading" id="loading">
Sedang mengambil video...
</div>

<div class="error" id="error"></div>

<div class="result" id="result">

<div class="card">

<img id="thumb" class="thumb">

<div class="content">

<div class="title" id="title"></div>

<div class="author" id="author"></div>

<div class="buttons">

<a
id="videoBtn"
class="btn video"
target="_blank"
>
📥 Download Video
</a>

<a
id="mp3Btn"
class="btn mp3"
target="_blank"
>
🎧 Download MP3
</a>

</div>

</div>

</div>

</div>

</div>

<script>

async function downloadTT(){

  const url =
    document.getElementById("url").value.trim();

  const loading =
    document.getElementById("loading");

  const result =
    document.getElementById("result");

  const error =
    document.getElementById("error");

  result.style.display = "none";
  error.style.display = "none";

  if(!url){

    error.innerText =
      "Masukkan link TikTok!";

    error.style.display = "block";

    return;
  }

  loading.style.display = "block";

  try{

    // FETCH KE BACKEND SENDIRI
    const response =
      await fetch(
        `/api/tiktok?url=${encodeURIComponent(url)}`
      );

    const json =
      await response.json();

    loading.style.display = "none";

    console.log(json);

    if(!json.status){

      error.innerText =
        "Video gagal ditemukan!";

      error.style.display = "block";

      return;
    }

    document.getElementById("thumb").src =
      json.cover;

    document.getElementById("title").innerText =
      json.title;

    document.getElementById("author").innerText =
      "👤 " + json.author;

    document.getElementById("videoBtn").href =
      json.download.nowm;

    document.getElementById("mp3Btn").href =
      json.download.mp3;

    result.style.display = "block";

  }catch(err){

    loading.style.display = "none";

    error.innerText =
      "Terjadi error!";

    error.style.display = "block";

    console.log(err);

  }

}

</script>

</body>
</html>
