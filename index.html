<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TikTok Downloader</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:white;
}

.container{
  width:100%;
  max-width:500px;
  background:#111827;
  border-radius:20px;
  padding:25px;
  box-shadow:0 0 25px rgba(0,0,0,.4);
}

h1{
  text-align:center;
  color:#8b5cf6;
  margin-bottom:10px;
}

p{
  text-align:center;
  color:#94a3b8;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
  outline:none;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#7c3aed;
  color:white;
  font-weight:bold;
  margin-top:15px;
  cursor:pointer;
}

.result{
  display:none;
  margin-top:20px;
}

.card{
  background:#1e293b;
  border-radius:15px;
  overflow:hidden;
}

.thumb{
  width:100%;
}

.content{
  padding:15px;
}

.title{
  font-size:17px;
  margin-bottom:10px;
}

.author{
  color:#94a3b8;
  margin-bottom:15px;
}

.btn{
  display:block;
  text-decoration:none;
  text-align:center;
  padding:14px;
  border-radius:12px;
  color:white;
  font-weight:bold;
  margin-top:10px;
}

.video{
  background:#22c55e;
}

.mp3{
  background:#f59e0b;
}

.loading{
  display:none;
  text-align:center;
  margin-top:15px;
}

.error{
  display:none;
  margin-top:15px;
  background:#dc2626;
  padding:12px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>🎵 TikTok Downloader</h1>

<p>Download Video TikTok No Watermark & MP3</p>

<input type="text" id="url" placeholder="Tempel link TikTok...">

<button onclick="downloadTT()">🚀 Download</button>

<div class="loading" id="loading">
Sedang mengambil data...
</div>

<div class="error" id="error"></div>

<div class="result" id="result">

<div class="card">

<img id="thumb" class="thumb">

<div class="content">

<div class="title" id="title"></div>

<div class="author" id="author"></div>

<a id="video" class="btn video" target="_blank">
📥 Download Video
</a>

<a id="mp3" class="btn mp3" target="_blank">
🎧 Download MP3
</a>

</div>
</div>
</div>
</div>

<script>
async function downloadTT(){

  const url = document.getElementById("url").value.trim();

  const loading = document.getElementById("loading");
  const error = document.getElementById("error");
  const result = document.getElementById("result");

  loading.style.display = "none";
  error.style.display = "none";
  result.style.display = "none";

  if(!url){
    error.innerText = "Masukkan link TikTok!";
    error.style.display = "block";
    return;
  }

  loading.style.display = "block";

  try{

    // API BARU
    const api = `https://v1.tikkdown.my.id/api/v1?url=${encodeURIComponent(url)}`;

    const res = await fetch(api);
    const json = await res.json();

    loading.style.display = "none";

    if(!json.status){
      error.innerText = "Video tidak ditemukan!";
      error.style.display = "block";
      return;
    }

    document.getElementById("thumb").src =
      json.cover;

    document.getElementById("title").innerText =
      json.title;

    document.getElementById("author").innerText =
      "👤 " + json.author;

    document.getElementById("video").href =
      json.download.nowm;

    document.getElementById("mp3").href =
      json.download.mp3;

    result.style.display = "block";

  }catch(err){

    loading.style.display = "none";

    error.innerText = "API Error / CORS!";
    error.style.display = "block";

    console.log(err);
  }
}
</script>

</body>
</html>
