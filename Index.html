<!-- index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.box{
  width:100%;
  max-width:500px;
  background:#111827;
  padding:25px;
  border-radius:20px;
}

h2{
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  margin-top:15px;
  background:#1e293b;
  color:white;
  outline:none;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  margin-top:15px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.download{
  background:#7c3aed;
}

.video{
  background:#22c55e;
}

.mp3{
  background:#f59e0b;
}

.result{
  display:none;
  margin-top:20px;
}

img{
  width:100%;
  border-radius:15px;
}

.title{
  margin-top:15px;
  font-size:18px;
}

.author{
  color:#94a3b8;
  margin-top:10px;
}

.loading{
  display:none;
  text-align:center;
  margin-top:15px;
}
</style>
</head>
<body>

<div class="box">

<h2>🎵 TikTok Downloader</h2>

<input
type="text"
id="url"
placeholder="Tempel link TikTok..."
>

<button
class="download"
onclick="getVideo()"
>
🚀 Download
</button>

<div class="loading" id="loading">
Loading...
</div>

<div class="result" id="result">

<img id="thumb">

<div class="title" id="title"></div>

<div class="author" id="author"></div>

<button
class="video"
onclick="downloadVideo()"
>
📥 Download Video
</button>

<button
class="mp3"
onclick="downloadMp3()"
>
🎧 Download MP3
</button>

</div>

</div>

<script>

let videoUrl = "";
let mp3Url = "";

async function getVideo(){

  const url =
    document.getElementById("url").value;

  if(!url){
    alert("Masukkan link!");
    return;
  }

  document.getElementById("loading")
    .style.display = "block";

  try{

    const res =
      await fetch(
        `/api/tiktok?url=${encodeURIComponent(url)}`
      );

    const json =
      await res.json();

    document.getElementById("loading")
      .style.display = "none";

    if(!json.status){
      alert("Video tidak ditemukan!");
      return;
    }

    videoUrl =
      json.download.nowm;

    mp3Url =
      json.download.mp3;

    document.getElementById("thumb").src =
      json.cover;

    document.getElementById("title").innerText =
      json.title;

    document.getElementById("author").innerText =
      "👤 " + json.author;

    document.getElementById("result")
      .style.display = "block";

  }catch(err){

    document.getElementById("loading")
      .style.display = "none";

    alert("Error!");

    console.log(err);

  }

}

function forceDownload(url, filename){

  const a =
    document.createElement("a");

  a.href = url;

  a.setAttribute("download", filename);

  document.body.appendChild(a);

  a.click();

  document.body.removeChild(a);
}

function downloadVideo(){

  forceDownload(
    videoUrl,
    "tiktok-video.mp4"
  );

}

function downloadMp3(){

  forceDownload(
    mp3Url,
    "tiktok-audio.mp3"
  );

}

</script>

</body>
  </html>
